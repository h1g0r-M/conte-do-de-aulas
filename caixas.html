<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Três Caixas Horizontais</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    section {
      display: flex;
      height: 200px;
    }

    .box {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
    }

    .box1 {
      background-color: #3498db;
    }

    .box2 {
      background-color: #2ecc71;
    }

    .box3 {
      background-color: #e74c3c;
    }
  </style>
</head>
<body>

<section>
  <div class="box box1">Caixa 1</div>
  <div class="box box2">Caixa 2</div>
  <div class="box box3">Caixa 3</div>
</section>

</body>
</html>
