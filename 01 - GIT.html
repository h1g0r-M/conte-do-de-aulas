<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600;700&amp;family=Roboto+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #0d1117; 
            color: #c9d1d9; 
            font-family: 'Source Sans 3', sans-serif; 
        }
        .slide-container { 
            width: 1280px; 
            height: 720px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            position: relative; 
            background-color: #0d1117; 
        }
        .mono-font { 
            font-family: 'Roboto Mono', monospace; 
        }
        .terminal-window {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            width: 85%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
        }
        .terminal-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background-color: #0d1117;
            border-bottom: 1px solid #30363d;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }
        .dot { 
            width: 12px; 
            height: 12px; 
            border-radius: 50%; 
            margin-right: 8px; 
        }
        .red { background-color: #ff5f56; }
        .yellow { background-color: #ffbd2e; }
        .green { background-color: #27c93f; }
        .content-area { 
            padding: 50px; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
        }
        .tag-pill {
            background-color: rgba(56, 139, 253, 0.1);
            color: #58a6ff;
            border: 1px solid rgba(56, 139, 253, 0.3);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            margin: 0 8px;
        }
        .code-block {
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px 24px;
            text-align: left;
            width: 100%;
            max-width: 700px;
            margin-top: 30px;
        }
        .accent-text {
            color: #58a6ff;
        }
        .cmd-prompt {
            color: #3fb950;
            margin-right: 8px;
        }
    </style>
</head>
<body>
<div class="slide-container">
<!-- Decorative Background Circle -->
<div style="position: absolute; top: -100px; right: -100px; width: 400px; height: 400px; border-radius: 50%; background-color: rgba(88, 166, 255, 0.05); filter: blur(50px);"></div>
<div style="position: absolute; bottom: -50px; left: -50px; width: 300px; height: 300px; border-radius: 50%; background-color: rgba(63, 185, 80, 0.05); filter: blur(40px);"></div>
<div class="terminal-window">
<div class="terminal-header">
<div class="dot red"></div>
<div class="dot yellow"></div>
<div class="dot green"></div>
<div class="mono-font text-xs text-gray-500 ml-4 flex-1 text-center" style="opacity: 0.7;">git — encontro-01</div>
</div>
<div class="content-area">
<p class="text-sm font-semibold tracking-wider text-gray-400 uppercase mb-4">Projeto</p>
<h1 class="text-5xl font-bold text-white mb-2 tracking-tight">Sistema de Solicitação Interna</h1>
<div class="h-1 w-32 bg-blue-500 rounded my-6"></div>
<h2 class="text-3xl text-gray-300 mb-8 font-light">Encontro 1: <span class="font-normal text-white">Introdução + Git Local</span></h2>
<div class="flex justify-center flex-wrap mb-6">
<div class="tag-pill mono-font"><i class="fas fa-layer-group mr-2"></i>Contexto</div>
<div class="tag-pill mono-font"><i class="fas fa-code-branch mr-2"></i>Versionamento</div>
<div class="tag-pill mono-font"><i class="fas fa-laptop-code mr-2"></i>Repositório Local</div>
<div class="tag-pill mono-font"><i class="fas fa-check-circle mr-2"></i>Primeiro Commit</div>
</div>
<div class="code-block shadow-lg">
<p class="mono-font text-sm text-gray-400 mb-2"># Objetivo da sessão:</p>
<div class="flex items-start">
<span class="cmd-prompt mono-font">$</span>
<p class="mono-font text-base text-white">git commit -m "feat: repositório inicial organizado"</p>
</div>
</div>
</div>
</div>
<div class="absolute bottom-6 w-full px-12 flex justify-between text-gray-600 text-xs mono-font">
<div class="flex items-center gap-2">
<i class="fab fa-github text-lg"></i>
<p>Treinamento Técnico</p>
</div>
<p>git status: branch main • 2026</p>
</div>
</div>
</body>
</html>
