<html> 
   <head></head> 
    <form id =carteira>
  <body>
    
    <div>

    <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Nome Completo">
</div>
<div>
    <label for="curso">Curso:</label>
        <input type="text" id="curso" name="curso" placeholder="Curso">
</div>
<div>
    <label for="nota">Nota:</label>
         <input type="number" id="nota" name="nota" placeholder="Digite a nota">
</div>
    <button type="submit">Enviar</button>

</form>
</body>
<h2>Lista de Alunos:</h2>
<ul id="listaAlunos"></ul>
<script>
    const alunos = [];
    var form = document.getElementById("carteira");

    form.addEventListener("submit",function(e)
     {
        e.preventDefault();

    const nome = document.getElementById("nome").value;
    const curso = document.getElementById("curso").value;
    const nota = Number(document.getElementById("nota").value);
    
    const novoAluno = {nome, curso, nota };

 
  alunos.push(novoAluno);
  console.log(alunos);
       mostrarLista(); // atualiza a lista no HTML

    // opcional: limpar os campos
    form.reset();
});

// função que atualiza a lista no HTML
function mostrarLista() {
    const lista = document.getElementById("listaAlunos");
    lista.innerHTML = ""; // limpa a lista antes de atualizar

    alunos.forEach((aluno, index) => {
        const li = document.createElement("li");
        li.textContent = `${index + 1}. Nome: ${aluno.nome}, Curso: ${aluno.curso}, Nota: ${aluno.nota}`;
        lista.appendChild(li);
    });
}

    


     

</script>
